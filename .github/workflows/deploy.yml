name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths: ["client/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright Browsers and Dependencies
        run: npx playwright install chromium --with-deps

      - name: Run E2E Browser Tests
        run: node run-browser-tests.js
        env:
          CI: true

      - name: Upload Test Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-video
          path: test-artifacts/

      # The gazetteer (cities blob + ~8k village buckets, ~82MB) is generated,
      # not committed. Cache the built output keyed by the build script so normal
      # deploys restore it instantly and only regenerate when the script changes.
      - name: Restore prebuilt gazetteer
        id: gaz-cache
        uses: actions/cache@v4
        with:
          path: client/src/public/gaz
          key: gazetteer-v1-${{ hashFiles('client/scripts/build-gazetteer.js') }}

      - name: Cache GeoNames source data
        if: steps.gaz-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            client/cities1000.txt
            client/alternateNamesV2.txt
            client/allCountries.txt
            client/countryInfo.txt
            client/admin1CodesASCII.txt
          key: geonames-data-v1

      - name: Build gazetteer (on cache miss)
        if: steps.gaz-cache.outputs.cache-hit != 'true'
        run: npm run build:gazetteer
        working-directory: client

      - name: Build client
        run: npm run build
        env:
          VITE_BASE: "/saysheep/"
          VITE_RELAY_URL: ${{ secrets.RELAY_URL }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - id: deployment
        uses: actions/deploy-pages@v4
