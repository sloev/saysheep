name: Deploy to GitHub Pages

on:
  push:
    branches: [master, "claude/*"]
    paths: ["client/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          VITE_BASE: ""
          VITE_RELAY_URL: ${{ secrets.RELAY_URL }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - id: deployment
        uses: actions/deploy-pages@v4
