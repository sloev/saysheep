name: Android APK/AAB

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach APK to (e.g. v0.2.0). Leave empty to upload as artifact only.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('plugins/**/build.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: Build PWA
        run: npm run build
        env:
          VITE_BASE: /
          VITE_RELAY_URL: ${{ secrets.RELAY_URL }}

      - name: Add Capacitor Android platform
        run: cd client && npx cap add android

      - name: Generate Android launcher icons
        run: cd client && npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: cd client && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build release AAB
        run: cd client/android && ./gradlew bundleRelease

      - name: Build release APK
        run: cd client/android && ./gradlew assembleRelease

      # The signing action's zipalign/apksigner default to build-tools 29.0.3,
      # which isn't installed on the runner. Pin it to the newest build-tools the
      # gradle build actually installed.
      - name: Resolve build-tools version
        id: bt
        run: echo "ver=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Sign AAB
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.ver }}
        with:
          releaseDirectory: client/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        env:
          BUILD_TOOLS_VERSION: ${{ steps.bt.outputs.ver }}
        with:
          releaseDirectory: client/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload unsigned artifacts (no keystore)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: saysheep-unsigned
          path: |
            client/android/app/build/outputs/bundle/release/*.aab
            client/android/app/build/outputs/apk/release/*.apk

      - name: Attach signed builds to release
        if: ${{ env.KEYSTORE_BASE64 != '' && (github.event_name == 'push' || inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
